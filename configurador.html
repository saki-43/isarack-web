<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISARACK · Configurador 3D (Góndola + Picking + Selectivo)</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:#eef0f2;overflow:hidden;color:#2a2d31}
  #cv{position:fixed;inset:0}
  #cv canvas{display:block;width:100%;height:100%}
  .panel{position:fixed;background:rgba(255,255,255,.96);backdrop-filter:blur(6px);
    border-radius:14px;box-shadow:0 6px 24px rgba(0,0,0,.12)}

  /* CONTROL — izquierda */
  #ctrl{top:10px;left:10px;width:220px;padding:10px 12px;max-height:calc(100vh - 20px);overflow-y:auto}
  #ctrl h1{font-size:13px;color:#D85A30;margin-bottom:6px;letter-spacing:.3px}
  .row{margin-bottom:6px}
  .row label{display:block;font-size:9.5px;color:#6a6f75;margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px}
  select,input:not([type=checkbox]){width:100%;padding:5px 8px;border:1px solid #d4d8dc;border-radius:6px;font-size:12.5px;background:#fff;font-family:inherit}
  .chk{display:flex;align-items:center;gap:7px;font-size:11.5px;color:#444;margin-top:1px;line-height:1.2}
  .chk input[type=checkbox]{width:14px;height:14px;flex-shrink:0;margin:0;accent-color:#da6635}
  button{width:100%;padding:8px;border:0;border-radius:7px;font-size:12.5px;font-weight:600;cursor:pointer}
  #wa{background:#e6e8ea;color:#444;margin-top:6px;font-size:11px;padding:6px;font-weight:500}
  #reset{background:transparent;color:#9aa0a6;margin-top:1px;font-weight:400;font-size:10.5px;padding:4px}

  /* COTIZACIÓN — derecha */
  #cotz{top:14px;right:14px;width:330px;max-height:calc(100vh - 28px);display:flex;flex-direction:column}
  #cotz .head{padding:14px 16px 12px;border-bottom:1px solid #ebedef}
  #pdfBtn{background:#D85A30;color:#fff;font-size:14px}
  #pdfBtn:active{background:#bd4a24}
  #cotz .ttl{padding:14px 16px 4px}
  #cotz .ttl h2{font-size:15px;color:#2a2d31}
  #cotz .ttl .sub{font-size:11px;color:#9aa0a6;margin-top:2px}
  #cotz .ttl .medidas{font-size:12px;color:#444;margin-top:6px;padding-top:6px;border-top:1px solid #ebedef}
  #cotz .ttl .medidas b{color:#D85A30;font-weight:600}
  #cotz .body{flex:1;overflow:auto;padding:8px 16px}
  .li{padding:10px 0;border-bottom:1px solid #f0f1f2;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start}
  .li .sku{font-size:10.5px;font-weight:700;color:#D85A30;letter-spacing:.5px}
  .li .prd{font-size:13px;color:#2a2d31;line-height:1.25;margin-top:1px}
  .li .pu{font-size:11px;color:#9aa0a6;margin-top:2px}
  .li .qy{font-size:16px;font-weight:700;color:#2a2d31;text-align:right;line-height:1}
  .li .im{font-size:11px;color:#9aa0a6;text-align:right;margin-top:3px}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0;padding:10px 16px;border-top:1px solid #ebedef;border-bottom:1px solid #ebedef;background:#fafbfc}
  .stats .s{text-align:center}
  .stats .v{font-size:18px;font-weight:700;color:#D85A30}
  .stats .l{font-size:10px;color:#9aa0a6;letter-spacing:.5px;text-transform:uppercase;margin-top:2px}
  #cotz .totales{padding:12px 16px 14px;background:#fff;border-radius:0 0 14px 14px}
  .tr{display:flex;justify-content:space-between;font-size:13px;color:#444;margin-bottom:4px;align-items:center}
  .tr.gd{font-size:17px;font-weight:700;color:#D85A30;margin-top:6px;padding-top:8px;border-top:1px solid #ebedef}
  .tr select{width:auto;padding:3px 6px;font-size:12px}
  #dims{position:fixed;bottom:14px;left:14px;font-size:11px;color:#6a6f75;background:rgba(255,255,255,.85);padding:8px 12px;border-radius:8px;line-height:1.5}
  #dims b{color:#D85A30}
  #hint{position:fixed;bottom:10px;right:360px;font-size:11px;color:#9aa0a6}
  #ldg{padding:20px;text-align:center;color:#9aa0a6;font-size:12px}

  /* Modal */
  #ov{position:fixed;inset:0;background:rgba(20,22,26,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
  #ov.on{display:flex}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:560px;max-height:92vh;overflow:auto;box-shadow:0 24px 60px rgba(0,0,0,.35)}
  .mhead{padding:16px 20px;border-bottom:1px solid #ebedef;display:flex;justify-content:space-between;align-items:center}
  .mhead h2{font-size:17px;color:#D85A30}
  .mhead .x{cursor:pointer;font-size:22px;color:#9aa0a6;background:none;width:auto;padding:0 6px}
  .mbody{padding:16px 20px}
  .mbody .row{margin-bottom:11px}
  .mbody .grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .mfoot{padding:14px 20px;border-top:1px solid #ebedef;display:flex;gap:10px;justify-content:flex-end}
  .mfoot button{width:auto;padding:10px 18px}
  .mfoot .sec{background:#e6e8ea;color:#444}
  .mfoot .prm{background:#D85A30;color:#fff}
  .badge{display:inline-block;background:#fff3ee;color:#D85A30;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}

  @media (max-width:768px){
    body{overflow-y:auto;overflow-x:hidden;background:#eef0f2}
    #cv{position:relative !important;inset:auto !important;width:100vw;height:55vh}
    .panel{position:relative !important;inset:auto !important;top:auto !important;left:auto !important;right:auto !important;bottom:auto !important;width:auto !important;max-height:none !important;margin:10px;backdrop-filter:none}
    #ctrl{padding:12px 14px}
    #ctrl h1{font-size:13px}
    #cotz{display:block}
    #cotz .body{max-height:60vh;overflow:auto}
    #dims,#hint{display:none}
    .modal{max-height:88vh}
  }
/* Tabs selector de sistema */
.tabs{display:flex;background:#f6f4ee;padding:3px;border-radius:8px;margin-bottom:8px;gap:3px}
.tabs .tab{flex:1;padding:6px 4px;text-align:center;font-size:11px;font-weight:500;color:#6e737b;cursor:pointer;border-radius:6px;transition:all .15s;user-select:none}
.tabs .tab:hover{color:#1a1d22}
.tabs .tab.active{background:#fff;color:#1a1d22;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.06)}
/* Badges de existencia en la lista de materiales */
.stk{display:inline-block;font-size:10.5px;font-weight:600;padding:1.5px 6px;border-radius:4px;margin-left:5px;vertical-align:middle}
.stk-ok{background:#e6f4ea;color:#137333}
.stk-par{background:#fff3e0;color:#b35c00}
.stk-no{background:#fce8e6;color:#c5221f}
.stk-p{background:#e8eaed;color:#5f6368}
/* Inputs de altura manual por nivel */
.alturas-nivel{margin-top:4px;padding:6px 8px;background:#faf8f3;border-radius:6px;border:1px solid #ece8df;display:none}
.alturas-nivel.activo{display:block}
.alturas-nivel .lvl-row{display:grid;grid-template-columns:34px 1fr 44px;gap:4px;align-items:center;margin-bottom:4px}
.alturas-nivel .lvl-row:last-child{margin-bottom:0}
.alturas-nivel .lvl-lbl{font-size:10px;color:#6e737b;line-height:1.05}
.alturas-nivel .lvl-row input[type=number]{width:100%;padding:4px 6px;font-size:11.5px;border:1px solid #d9d4c5;border-radius:5px;background:#fff;outline:none;font-weight:500}
.alturas-nivel .lvl-row input[type=number]:focus{border-color:#da6635}
.alturas-nivel .lvl-unit{font-size:10px;color:#9aa0a6;line-height:1.1;display:flex;flex-direction:column;align-items:flex-start}
.alturas-nivel .lvl-cm{color:#da6635;font-size:9.5px;font-weight:600;margin-top:1px}
</style>
</head>

<div id="cv"></div>

<!-- Panel izquierdo: configuración -->

// Calcula el costo de instalación: 5% del valor de ventas, mínimo $80 USD
function calcularInstalacion(materialUSD){
  const pct = materialUSD * 0.05;
  return Math.max(pct, 80);
}

function calcularFlete(sub){
  sub = Number(sub)||0;
  let f = 0, bloque = '';
  if(sub<=250){ f=50; bloque='Bloque 1 · tarifa fija $50'; }
  else if(sub<=1800){ f=50+(sub-250)/1550*100; bloque='Bloque 2 · $50→$150 lineal'; }
  else if(sub<=8000){ f=150+(sub-1800)/6200*250; bloque='Bloque 3 · $150→$400 lineal'; }
  else if(sub<=100000){ const pct=5-(sub-8000)/92000*2; f=sub*pct/100; bloque='Bloque 4 · '+pct.toFixed(2)+'%'; }
  else { f=sub*0.03; bloque='Bloque 5 · 3% fijo'; }
  return { flete: Math.round(f*100)/100, bloque };
}

// Textura procedural de rejilla electrosoldada (patrón cuadriculado)
function crearTexturaRejilla(){
  const c = document.createElement('canvas');
  c.width = c.height = 128;
  const g = c.getContext('2d');
  // Fondo: gris claro de fondo
  g.fillStyle = '#a5a098';
  g.fillRect(0, 0, 128, 128);
  // Cuadros pequeños (huecos blancos)
  g.fillStyle = '#f5f3ee';
  const cellSize = 16, barW = 4;
  for(let y = barW; y < 128; y += cellSize){
    for(let x = barW; x < 128; x += cellSize){
      g.fillRect(x, y, cellSize - barW, cellSize - barW);
    }
  }
  // Barras (las divisiones entre cuadros, más oscuras = metal)
  g.strokeStyle = '#3a3a36';
  g.lineWidth = 1;
  for(let i = 0; i <= 128; i += cellSize){
    g.beginPath(); g.moveTo(i, 0); g.lineTo(i, 128); g.stroke();
    g.beginPath(); g.moveTo(0, i); g.lineTo(128, i); g.stroke();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.needsUpdate = true;
  return tex;
}
const texRejillaBase = crearTexturaRejilla();
// Material que ajusta el repeat según el tamaño del mesh (función helper)
function crearMatRejillaTam(largoM, fondoM){
  const tex = texRejillaBase.clone();
  tex.needsUpdate = true;
  tex.repeat.set(Math.max(1, largoM/0.05), Math.max(1, fondoM/0.05));
  return new THREE.MeshStandardMaterial({map: tex, metalness:0.3, roughness:0.6, side:THREE.DoubleSide});
}

// Material para barras de rejilla (acero galvanizado claro)
const matRejillaBarra = new THREE.MeshStandardMaterial({color:0xe0e0e0, metalness:0.4, roughness:0.45});

// Construye una rejilla electrosoldada con barras 3D reales
function crearRejillaReal(largoM, fondoM){
  const grp = new THREE.Group();
  const barraThk = 0.0065;          // 6.5 mm de grosor de barra
  // Barras LONGITUDINALES (paralelas al frente, espaciadas en el fondo)
  const nLong = 7;
  for(let i=0; i<nLong; i++){
    const z = -fondoM/2 + (i/(nLong-1)) * fondoM;
    const barra = box(largoM, barraThk, barraThk, matRejillaBarra);
    barra.position.set(0, 0, z);
    grp.add(barra);
  }
  // Barras TRANSVERSALES (perpendiculares, espaciadas en el largo) — ENCIMA
  // Densidad ~ cada 6 cm para que se vean como malla real sin saturar
  const sepTrans = 0.06;
  const nTrans = Math.max(6, Math.floor(largoM / sepTrans) + 1);
  for(let i=0; i<nTrans; i++){
    const x = -largoM/2 + (i/(nTrans-1)) * largoM;
    const barra = box(barraThk, barraThk, fondoM, matRejillaBarra);
    barra.position.set(x, barraThk, 0);
    grp.add(barra);
  }
  return grp;
}

let texturaIsaacImg = null;
let imagenIsaacEl = null;

function cargarImagenIsaac(){
  if(imagenIsaacEl) return;
  imagenIsaacEl = new Image();
  imagenIsaacEl.onload = () => {
    texturaIsaacImg = new THREE.Texture(imagenIsaacEl);
    texturaIsaacImg.needsUpdate = true;
    texturaIsaacImg.colorSpace = THREE.SRGBColorSpace || undefined;
    // Si ya hay un modelo construido, rebuild para incluir el muñeco
    if(grupo) build();
  };
  imagenIsaacEl.src = IMG_ISAAC_B64;
}

function buildPersonaIsaac(parent, x, z){
  if(!texturaIsaacImg){
    cargarImagenIsaac();
    return;
  }
  const ANCHO = 0.733;
  const ALTO  = 1.75;
  const mat = new THREE.MeshBasicMaterial({
    map: texturaIsaacImg,
    transparent: true,
    alphaTest: 0.5,
    side: THREE.DoubleSide
  });
  const geo = new THREE.PlaneGeometry(ANCHO, ALTO);
  const sprite = new THREE.Mesh(geo, mat);
  sprite.position.set(x, ALTO/2, z);
  sprite.userData.isaacSprite = true;
  parent.add(sprite);
}

// Textura procedural de pegboard (grid de perforaciones) para el back panel
function makePegboardTexture(){
  const c = document.createElement('canvas');
  c.width = c.height = 256;
  const g = c.getContext('2d');
  g.fillStyle = '#f4f1ea';                // base blanco perla
  g.fillRect(0,0,256,256);
  const sp = 16, hole = 5;
  g.fillStyle = '#a8a59f';                // perforaciones gris cálido (no azulado)
  for(let y=sp; y<256; y+=sp){
    for(let x=sp; x<256; x+=sp){
      g.fillRect(x-hole/2, y-hole/2, hole, hole);
    }
  }
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  return t;
}
let matPegPanel = null;
function getMatPanel(panW, panH){
  if(!matPegPanel){
    const tex = makePegboardTexture();
    matPegPanel = new THREE.MeshStandardMaterial({map:tex, color:0xfaf7f0, metalness:0.05, roughness:0.75});
  }
  const m = matPegPanel.clone();
  m.map = matPegPanel.map.clone();
  m.map.needsUpdate = true;
  m.map.wrapS = m.map.wrapT = THREE.RepeatWrapping;
  m.map.repeat.set(panW/0.10, panH/0.10);
  return m;
}

function box(w,h,d,mat){
  const g = new THREE.BoxGeometry(w,h,d);
  const m = new THREE.Mesh(g,mat);
  m.add(new THREE.LineSegments(new THREE.EdgesGeometry(g),matEdge));
  return m;
}

function buildRow(parent, central, alto, ancho, fondo, niv, mods){
  const pw = 0.045;
  const totalW = ancho*mods;
  const x0 = -totalW/2;
  // Cremallera: perforaciones cuadradas pequeñas y densas (como en las góndolas reales)
  const n = Math.floor((alto-0.20)/0.025);
  const caras = central ? [1,-1] : [1];
  for(let k=0;k<=mods;k++){
    const px = x0 + k*ancho;
    const p = box(pw, alto, pw, matMetal);
    p.position.set(px, alto/2, 0);
    parent.add(p);
    for(const c of caras){
      for(let i=0;i<n;i++){
        const r = new THREE.Mesh(new THREE.BoxGeometry(0.006,0.010,0.001), matCrem);
        r.position.set(0, 0.10 + i*0.025 - alto/2, c*(pw/2+0.0006));
        p.add(r);
      }
    }
  }
  const zoH = 0.18;                          // zócalo más grueso (como pedestal real)
  const yPrimera = zoH + 0.005;              // primera charola pegada arriba del zócalo
  const yBaseSup = zoH + 0.35;               // primera charola inclinada (segundo nivel)
  const yTop = alto - 0.20;
  const nSup = Math.max(niv - 1, 1);
  const paso = nSup > 1 ? (yTop - yBaseSup)/(nSup - 1) : 0;
  const tilt = 0.065;              // ~3.7° hacia atrás
  const chW = ancho - 0.05;
  const a211 = alto > 1.5;
  const panelesGrandes = a211 ? 5 : 3;
  const panelesChicos  = a211 ? 0 : 1;
  const yPanBase = zoH;
  const yPanTop  = alto - 0.005;
  const altoDisp = yPanTop - yPanBase;
  const sumaPan  = panelesGrandes*0.40 + panelesChicos*0.10;
  const fPan = altoDisp / sumaPan;
  // Construcción: doble back panel (frente + atrás del poste) + top cover
  const panThk = 0.012;
  const panW = ancho - pw;
  const panZFront = pw/2 + panThk/2;       // pegado al frente del poste
  const panZBack  = -pw/2 - panThk/2;      // pegado al atrás del poste
  const chOffset  = pw/2 + panThk + 0.003; // charolas arrancan justo enfrente del panel
  function charola(cx, y, dir, horizontal){
    const piv = new THREE.Object3D();
    piv.position.set(cx, y, 0);
    const ch = box(chW, 0.022, fondo, matCharola);
    ch.position.set(0, 0, dir*(fondo/2 + chOffset));
    piv.add(ch);
    const cop = box(chW, 0.05, 0.016, matMetal);
    cop.position.set(0, 0.026, dir*(fondo + chOffset));
    piv.add(cop);
    if(!horizontal) piv.rotation.x = -dir*tilt;
    parent.add(piv);
  }
  for(let mIdx=0; mIdx<mods; mIdx++){
    const cx = x0 + ancho/2 + mIdx*ancho;
    if(central){
      // Zócalo simétrico que abarca ambas caras incluyendo el offset
      const zD = 2*(fondo + chOffset) + 0.01;
      const z = box(ancho, zoH, zD, matMetal);
      z.position.set(cx, zoH/2, 0); parent.add(z);
    } else {
      // Zócalo de pared: de atrás del back panel hasta el frente de la charola
      const zFront = fondo + chOffset;
      const zBack = -pw/2 - panThk - 0.005;
      const zD = zFront - zBack;
      const z = box(ancho, zoH, zD, matMetal);
      z.position.set(cx, zoH/2, (zFront + zBack)/2); parent.add(z);
    }
    // Doble back panel (liso, sin perforaciones)
    const panFront = box(panW, altoDisp, panThk, matPanel);
    panFront.position.set(cx, yPanBase + altoDisp/2, panZFront);
    parent.add(panFront);
    const panBack = box(panW, altoDisp, panThk, matPanel);
    panBack.position.set(cx, yPanBase + altoDisp/2, panZBack);
    parent.add(panBack);
    // Top cover (cubierta superior) que tapa el hueco entre los 2 paneles
    const topD = pw + 2*panThk + 0.002;
    const topCover = box(panW, 0.012, topD, matMetal);
    topCover.position.set(cx, alto - 0.006, 0);
    parent.add(topCover);
    // Charolas: la primera horizontal pegada al zócalo, las demás inclinadas distribuidas arriba
    for(let i=0;i<niv;i++){
      const isPrimera = (i === 0);
      const y = isPrimera ? yPrimera : (yBaseSup + paso*(i-1));
      charola(cx, y, 1, isPrimera);
      if(central) charola(cx, y, -1, isPrimera);
    }
  }
}

function resize3D(){

  if(w>0 && h>0){
    camera.aspect = w/h;

    renderer.setSize(w, h);   // sin el false: actualiza también el style del canvas
  }
}

function buildPickingScene(parent, altoM, fondoM, largoM, niveles, cuerpos, tieneRejilla, tienePanel, tienePie){
  const postW = 0.05, postD = 0.05, placaH = 0.012;
  const nMarcos = cuerpos + 1;
  const totalLen = largoM * cuerpos;
  const x0 = -totalLen / 2;
  function marco(x){
    const zFront = fondoM/2 - postD/2;
    const zBack  = -fondoM/2 + postD/2;
    const p1 = box(postW, altoM, postD, matMarcoPic);
    p1.position.set(x, altoM/2, zFront); parent.add(p1);
    const p2 = box(postW, altoM, postD, matMarcoPic);
    p2.position.set(x, altoM/2, zBack); parent.add(p2);
    if(tienePie){
      const pieW = 0.16, pieD = 0.16;
      const f1 = box(pieW, placaH, pieD, matPiePic);
      f1.position.set(x, placaH/2, zFront); parent.add(f1);
      const f2 = box(pieW, placaH, pieD, matPiePic);
      f2.position.set(x, placaH/2, zBack); parent.add(f2);
      // Pernos de anclaje (4 por placa)
      const pernoGeoP = new THREE.CylinderGeometry(0.009, 0.009, 0.018, 8);
      [[-pieW/2+0.022,-pieD/2+0.022],[pieW/2-0.022,-pieD/2+0.022],[-pieW/2+0.022,pieD/2-0.022],[pieW/2-0.022,pieD/2-0.022]].forEach(([px,pz])=>{
        const pn1 = new THREE.Mesh(pernoGeoP, matPerno); pn1.position.set(x+px, placaH+0.009, zFront+pz); parent.add(pn1);
        const pn2 = new THREE.Mesh(pernoGeoP, matPerno); pn2.position.set(x+px, placaH+0.009, zBack+pz); parent.add(pn2);
      });
    }
    const yIni = 0.15, yFin = altoM - 0.10, seg = 0.6096;  // 2 ft entre diagonales
    const nSeg = Math.max(3, Math.floor((yFin - yIni) / seg));
    const pasoSeg = (yFin - yIni) / nSeg;
    // Solo 2 travesaños horizontales: uno arriba, otro abajo
    const travLenP = fondoM - postD;
    const travAbP = box(0.020, 0.020, travLenP, matMarcoPic);
    travAbP.position.set(x, yIni, 0);
    parent.add(travAbP);
    const travArP = box(0.020, 0.020, travLenP, matMarcoPic);
    travArP.position.set(x, yFin, 0);
    parent.add(travArP);
    // Diagonales en zigzag continuo
    for(let i=0;i<nSeg;i++){
      const yA = yIni + i*pasoSeg, yB = yIni + (i+1)*pasoSeg;
      const dir = (i%2===0) ? 1 : -1;
      const zA = dir>0 ? zFront : zBack;
      const zB = dir>0 ? zBack : zFront;
      const dy = yB - yA, dz = zB - zA;
      const len = Math.sqrt(dy*dy + dz*dz);
      const g = new THREE.BoxGeometry(0.016, len, 0.016);
      const m = new THREE.Mesh(g, matMarcoPic);
      m.position.set(x, (yA+yB)/2, (zA+zB)/2);
      m.rotation.x = Math.atan2(dz, dy);
      parent.add(m);
    }
  }
  for(let k=0; k<nMarcos; k++) marco(x0 + k * largoM);
  // Posición Y de cada nivel: manual (si está activo) o uniforme
  const alturasManPic = getAlturasManualesM('picking');
  const yIniN = 0.30, yTopN = altoM - 0.15;
  const paso = niveles > 1 ? (yTopN - yIniN) / (niveles - 1) : 0;
  for(let c=0; c<cuerpos; c++){
    const cx = x0 + c * largoM + largoM/2;
    for(let n=0; n<niveles; n++){
      const y = alturasManPic ? Math.min(alturasManPic[n], altoM - 0.10) : (yIniN + paso * n);
      const usaPanel = tienePanel && !tieneRejilla;
      const usaRej   = tieneRejilla;
      if(usaRej || usaPanel){
        const cargaW = largoM - postW*1.1;
        const cargaD = fondoM - postD*1.2;
        if(usaRej){
          const rej = crearRejillaReal(cargaW, cargaD);
          rej.position.set(cx, y + 0.005, 0);
          parent.add(rej);
        } else {
          const thk = 0.014;
          const carga = box(cargaW, thk, cargaD, matPanelG);
          carga.position.set(cx, y, 0);
          parent.add(carga);
        }
      }
      // Vigas/travesaños naranjas (frente y atrás del cuerpo)
      const vigaH = 0.05, vigaD = 0.035;
      const vF = box(largoM - postW, vigaH, vigaD, matVigaPic);
      vF.position.set(cx, y - vigaH/2 - 0.005, fondoM/2 - postD/2);
      parent.add(vF);
      const vB = box(largoM - postW, vigaH, vigaD, matVigaPic);
      vB.position.set(cx, y - vigaH/2 - 0.005, -fondoM/2 + postD/2);
      parent.add(vB);
      // Uniones color marco pegadas al poste
      const uniWp = 0.024, uniHp = vigaH + 0.06, uniDp = vigaD * 1.7;
      const xIzqP = cx - (largoM - postW)/2 - uniWp/2;
      const xDerP = cx + (largoM - postW)/2 + uniWp/2;
      [xIzqP, xDerP].forEach(xU => {
        const u1 = box(uniWp, uniHp, uniDp, matMarcoPic);
        u1.position.set(xU, y - vigaH/2, fondoM/2 - postD/2); parent.add(u1);
        const u2 = box(uniWp, uniHp, uniDp, matMarcoPic);
        u2.position.set(xU, y - vigaH/2, -fondoM/2 + postD/2); parent.add(u2);
      });
    }
  }
}

function buildRackSelectivo(parent, altoM, fondoM, vigaM, niveles, cuerpos, tieneRejilla, tieneTriplay, tieneBotas){
  const postW = 0.076, postD = 0.076, vigaH = 0.10, vigaD = 0.06;
  const nMarcos = cuerpos + 1;
  const totalLen = vigaM * cuerpos;
  const x0 = -totalLen / 2;
  function marco(x){
    const zFront = fondoM/2 - postD/2;
    const zBack  = -fondoM/2 + postD/2;
    const p1 = box(postW, altoM, postD, matMarcoSel);
    p1.position.set(x, altoM/2, zFront); parent.add(p1);
    const p2 = box(postW, altoM, postD, matMarcoSel);
    p2.position.set(x, altoM/2, zBack); parent.add(p2);
    const pieW = 0.24, pieT = 0.014, pieD = 0.22;
    const f1 = box(pieW, pieT, pieD, matPieSel); f1.position.set(x, pieT/2, zFront); parent.add(f1);
    const f2 = box(pieW, pieT, pieD, matPieSel); f2.position.set(x, pieT/2, zBack); parent.add(f2);
    // Pernos de anclaje (4 por placa)
    const pernoGeo = new THREE.CylinderGeometry(0.012, 0.012, 0.025, 8);
    [[-pieW/2+0.025,-pieD/2+0.025],[pieW/2-0.025,-pieD/2+0.025],[-pieW/2+0.025,pieD/2-0.025],[pieW/2-0.025,pieD/2-0.025]].forEach(([px,pz])=>{
      const pn1 = new THREE.Mesh(pernoGeo, matPerno); pn1.position.set(x+px, pieT+0.012, zFront+pz); parent.add(pn1);
      const pn2 = new THREE.Mesh(pernoGeo, matPerno); pn2.position.set(x+px, pieT+0.012, zBack+pz); parent.add(pn2);
    });
    if(tieneBotas){
      const b = box(0.10, 0.30, fondoM + 0.05, matBota);
      b.position.set(x, 0.15, 0); parent.add(b);
    }
    const yIni = 0.20, yFin = altoM - 0.20, seg = 0.6096;  // 2 ft entre diagonales
    const nSeg = Math.max(2, Math.floor((yFin - yIni) / seg));
    const pasoSeg = (yFin - yIni) / nSeg;
    // Solo 2 travesaños horizontales: uno arriba, otro abajo
    const travLen = fondoM - postD;
    const travAb = box(0.028, 0.028, travLen, matMarcoSel);
    travAb.position.set(x, yIni, 0);
    parent.add(travAb);
    const travAr = box(0.028, 0.028, travLen, matMarcoSel);
    travAr.position.set(x, yFin, 0);
    parent.add(travAr);
    // Diagonales en zigzag continuo
    for(let i=0;i<nSeg;i++){
      const yA = yIni + i*pasoSeg, yB = yIni + (i+1)*pasoSeg;
      const dir = (i%2===0) ? 1 : -1;
      const zA = dir>0 ? zFront : zBack;
      const zB = dir>0 ? zBack : zFront;
      const dy = yB - yA, dz = zB - zA;
      const len = Math.sqrt(dy*dy + dz*dz);
      const g = new THREE.BoxGeometry(0.022, len, 0.022);
      const m = new THREE.Mesh(g, matMarcoSel);
      m.position.set(x, (yA+yB)/2, (zA+zB)/2);
      m.rotation.x = Math.atan2(dz, dy);
      parent.add(m);
    }
  }
  for(let k=0; k<nMarcos; k++) marco(x0 + k * vigaM);
  // Posición Y de cada nivel: manual (si está activo) o uniforme
  const alturasManSel = getAlturasManualesM('selectivo');
  const yViga0 = 0.40, yVigaTop = altoM - 0.20;
  const pasoNiv = niveles > 1 ? (yVigaTop - yViga0) / (niveles - 1) : 0;
  for(let c=0; c<cuerpos; c++){
    const xL = x0 + c * vigaM, xR = xL + vigaM;
    const cxV = (xL + xR) / 2;
    for(let n=0; n<niveles; n++){
      const y = alturasManSel ? Math.min(alturasManSel[n], altoM - 0.10) : (yViga0 + pasoNiv * n);
      const vF = box(vigaM - postW, vigaH, vigaD, matVigaSel);
      vF.position.set(cxV, y, fondoM/2 - postD/2); parent.add(vF);
      const vB = box(vigaM - postW, vigaH, vigaD, matVigaSel);
      vB.position.set(cxV, y, -fondoM/2 + postD/2); parent.add(vB);
      // Uniones (conectores color marco pegados al poste)
      const uniW = 0.032, uniH = vigaH + 0.08, uniD = vigaD * 1.7;
      const xIzq = cxV - (vigaM - postW)/2 - uniW/2;
      const xDer = cxV + (vigaM - postW)/2 + uniW/2;
      [xIzq, xDer].forEach(xU => {
        const u1 = box(uniW, uniH, uniD, matMarcoSel);
        u1.position.set(xU, y, fondoM/2 - postD/2); parent.add(u1);
        const u2 = box(uniW, uniH, uniD, matMarcoSel);
        u2.position.set(xU, y, -fondoM/2 + postD/2); parent.add(u2);
      });
      if(tieneRejilla){
        const rejW = vigaM - postW;
        const rejD = fondoM - postD*1.5;
        const rej = crearRejillaReal(rejW, rejD);
        rej.position.set(cxV, y + vigaH/2 + 0.01, 0); parent.add(rej);
      } else if(tieneTriplay){
        const tri = box(vigaM - postW, 0.020, fondoM - postD*1.5, matTriplay);
        tri.position.set(cxV, y + vigaH/2 + 0.012, 0); parent.add(tri);
      }
    }
  }
}

const FT_TO_M = 0.3048;
const M_TO_FT = 1 / FT_TO_M;
const M_TO_IN = 1 / IN_TO_M;   // 39.3701

// Genera (o re-genera) los inputs de altura por nivel para un sistema dado
function actualizarInputsAlturasNivel(sistema){
  const cfg = sistema === 'selectivo' ? getConfigSel() : getConfigPic();
  const container = document.getElementById(sistema === 'selectivo' ? 'selAlturasContainer' : 'picAlturasContainer');
  const chk = document.getElementById(sistema === 'selectivo' ? 'selAlturaManual' : 'picAlturaManual');
  if(!chk.checked){
    container.classList.remove('activo');
    container.innerHTML = '';
    container.dataset.personalizado = 'no';
    return;
  }
  container.classList.add('activo');
  const wasPersonalizado = container.dataset.personalizado === 'yes';
  // Alturas previas guardadas (solo se preservan si el usuario ya personalizó)
  const prevInputs = container.querySelectorAll('input[type=number]');
  const prevVals = Array.from(prevInputs).map(i => parseFloat(i.value));
  // Default: dividir altoM entre niveles, convertir a pulgadas, redondear al múltiplo de 2 más cercano
  const espacioDefault = ((cfg.altoM * 0.85) / cfg.niveles) * M_TO_IN;  // 85% del alto útil
  const defaultRedondeado = Math.round(espacioDefault / 2) * 2;
  const valores = [];
  for(let i=0; i<cfg.niveles; i++){
    // Solo conservar si el usuario personalizó Y el nivel ya existía
    if(wasPersonalizado && prevVals[i] !== undefined && !isNaN(prevVals[i])){
      valores.push(prevVals[i]);
    } else {
      valores.push(defaultRedondeado);
    }
  }
  // Reconstruir HTML
  const sistemaId = sistema === 'selectivo' ? 'sel' : 'pic';
  let html = '';
  for(let i=0; i<cfg.niveles; i++){
    const cmInicial = (valores[i] * 2.54).toFixed(0);
    html += `<div class="lvl-row">
      <span class="lvl-lbl">Nivel<br>${i+1}</span>
      <input type="number" step="2" min="2" value="${valores[i]}" data-nivel="${i}" id="${sistemaId}Lvl${i}">
      <span class="lvl-unit">in<span class="lvl-cm">${cmInicial} cm</span></span>
    </div>`;
  }
  container.innerHTML = html;
  // Listeners para los inputs: actualizar cm en vivo + rebuild
  container.querySelectorAll('input[type=number]').forEach(inp => {
    inp.addEventListener('input', ()=>{
      const row = inp.closest('.lvl-row');
      const cmSpan = row && row.querySelector('.lvl-cm');
      if(cmSpan){
        const inches = parseFloat(inp.value) || 0;
        cmSpan.textContent = (inches * 2.54).toFixed(0) + ' cm';
      }
      // Cuando el usuario edita a mano, marcar como personalizado
      container.dataset.personalizado = 'yes';
      build();
    });
  });
}

// Devuelve array de posiciones Y (en metros) de cada viga si los claros personalizados están activos, o null
function getAlturasManualesM(sistema){
  const chk = document.getElementById(sistema === 'selectivo' ? 'selAlturaManual' : 'picAlturaManual');
  if(!chk.checked) return null;
  const container = document.getElementById(sistema === 'selectivo' ? 'selAlturasContainer' : 'picAlturasContainer');
  const inputs = container.querySelectorAll('input[type=number]');
  // Posiciones acumulativas: viga N está a (claro1 + claro2 + ... + claroN) desde el piso
  const yPositions = [];
  let acum = 0;
  for(const inp of inputs){
    const inches = parseFloat(inp.value) || 0;
    acum += inches * IN_TO_M;
    yPositions.push(acum);
  }
  return yPositions.length ? yPositions : null;
}

// === Cotas dimensionales (sprites de texto + líneas) ===
function crearTextoSprite(texto, color){
  const c = document.createElement('canvas');
  c.width = 256; c.height = 80;
  const g = c.getContext('2d');
  // fondo blanco semitransparente con borde
  g.fillStyle = 'rgba(255,255,255,0.92)';
  g.fillRect(0, 0, 256, 80);
  g.strokeStyle = color;
  g.lineWidth = 3;
  g.strokeRect(2, 2, 252, 76);
  // texto
  g.fillStyle = color;
  g.font = 'bold 42px Arial, sans-serif';
  g.textAlign = 'center';
  g.textBaseline = 'middle';
  g.fillText(texto, 128, 42);
  const tex = new THREE.CanvasTexture(c);
  tex.needsUpdate = true;
  const mat = new THREE.SpriteMaterial({map: tex, transparent: true, depthTest: false});
  const sprite = new THREE.Sprite(mat);
  return sprite;
}

function crearLineaCota(start, end, color){
  const mat = new THREE.LineBasicMaterial({color: color, depthTest: false});
  const geo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(...start),
    new THREE.Vector3(...end)
  ]);
  const line = new THREE.Line(geo, mat);
  line.renderOrder = 999;
  return line;
}

function agregarCotas(parent, largoM, fondoM, altoM, capacidadKg, largoVigaM){
  const NARANJA = 0xda6635;
  const margenLado = 0.25;
  const xR = largoM/2 + margenLado;    // a la derecha del rack
  const xL = -largoM/2;
  const zF = fondoM/2 + margenLado;    // al frente
  const yPiso = 0;

  // Cota ALTO (vertical, lado derecho)
  parent.add(crearLineaCota([xR-0.05, 0, 0], [xR+0.05, 0, 0], NARANJA));
  parent.add(crearLineaCota([xR-0.05, altoM, 0], [xR+0.05, altoM, 0], NARANJA));
  parent.add(crearLineaCota([xR, 0, 0], [xR, altoM, 0], NARANJA));
  const sAlto = crearTextoSprite(altoM.toFixed(2)+' M', '#da6635');
  sAlto.position.set(xR + 0.30, altoM/2, 0);
  sAlto.scale.set(0.55, 0.17, 1);
  parent.add(sAlto);

  // Cota LARGO TOTAL (horizontal, debajo del rack)
  const yBajo = -0.20;
  parent.add(crearLineaCota([xL, yBajo-0.05, 0], [xL, yBajo+0.05, 0], NARANJA));
  parent.add(crearLineaCota([largoM/2, yBajo-0.05, 0], [largoM/2, yBajo+0.05, 0], NARANJA));
  parent.add(crearLineaCota([xL, yBajo, 0], [largoM/2, yBajo, 0], NARANJA));
  const sLargo = crearTextoSprite(largoM.toFixed(2)+' M', '#da6635');
  sLargo.position.set(0, yBajo - 0.18, 0);
  sLargo.scale.set(0.55, 0.17, 1);
  parent.add(sLargo);

  // Cota LARGO DE UN CUERPO (la primera viga) — arriba del primer cuerpo
  if(largoVigaM && largoVigaM < largoM - 0.001){
    const yCotaViga = altoM + 0.20;
    const xV0 = xL;
    const xV1 = xL + largoVigaM;
    parent.add(crearLineaCota([xV0, yCotaViga-0.05, 0], [xV0, yCotaViga+0.05, 0], NARANJA));
    parent.add(crearLineaCota([xV1, yCotaViga-0.05, 0], [xV1, yCotaViga+0.05, 0], NARANJA));
    parent.add(crearLineaCota([xV0, yCotaViga, 0], [xV1, yCotaViga, 0], NARANJA));
    const sViga = crearTextoSprite(largoVigaM.toFixed(2)+' M', '#da6635');
    sViga.position.set(xV0 + largoVigaM/2, yCotaViga + 0.18, 0);
    sViga.scale.set(0.45, 0.14, 1);
    parent.add(sViga);
  }

  // Cota FONDO (al frente, abajo)
  const xCotaFondo = xL - 0.05;
  parent.add(crearLineaCota([xCotaFondo, yBajo-0.05, -fondoM/2], [xCotaFondo, yBajo+0.05, -fondoM/2], NARANJA));
  parent.add(crearLineaCota([xCotaFondo, yBajo-0.05,  fondoM/2], [xCotaFondo, yBajo+0.05,  fondoM/2], NARANJA));
  parent.add(crearLineaCota([xCotaFondo, yBajo, -fondoM/2], [xCotaFondo, yBajo,  fondoM/2], NARANJA));
  const sFondo = crearTextoSprite(fondoM.toFixed(2)+' M', '#da6635');
  sFondo.position.set(xCotaFondo - 0.35, yBajo, 0);
  sFondo.scale.set(0.45, 0.14, 1);
  parent.add(sFondo);

  // Capacidad (KG) — flotando en el centro del rack
  if(capacidadKg){
    const sCap = crearTextoSprite(capacidadKg+' KG', '#da6635');
    sCap.position.set(0, altoM * 0.55, 0);
    sCap.scale.set(0.7, 0.22, 1);
    parent.add(sCap);
  }
}

// Cotas de claros (espacio libre entre vigas/niveles)
function agregarCotasClaros(parent, alturasYM, xPos, zPos){
  if(!alturasYM || alturasYM.length === 0) return;
  const NARANJA = 0xda6635;
  // Claros: desde el piso al primer nivel, y entre niveles consecutivos
  const segmentos = [];
  let yAnt = 0;
  for(const y of alturasYM){
    segmentos.push([yAnt, y]);
    yAnt = y;
  }
  for(const [yA, yB] of segmentos){
    if(yB - yA < 0.05) continue;  // saltar claros muy pequeños
    parent.add(crearLineaCota([xPos-0.04, yA, zPos], [xPos+0.04, yA, zPos], NARANJA));
    parent.add(crearLineaCota([xPos-0.04, yB, zPos], [xPos+0.04, yB, zPos], NARANJA));
    parent.add(crearLineaCota([xPos, yA, zPos], [xPos, yB, zPos], NARANJA));
    const s = crearTextoSprite((yB - yA).toFixed(2)+' M', '#da6635');
    s.position.set(xPos - 0.28, (yA + yB)/2, zPos);
    s.scale.set(0.36, 0.11, 1);
    parent.add(s);
  }
}

function buildPicking(){
  const cfg = getConfigPic();
  if(!MARCOS_PIC[cfg.altoIn] || !MARCOS_PIC[cfg.altoIn][cfg.fondoIn]){
    // Si no existe esa combinación, ajustar al fondo más cercano disponible
    const fondos = Object.keys(MARCOS_PIC[cfg.altoIn] || {}).filter(k=>MARCOS_PIC[cfg.altoIn][k]);
    if(fondos.length){
      document.getElementById('picFondo').value = fondos[0];
      build(); return;
    }
  }
  buildPickingScene(grupo, cfg.altoM, cfg.fondoM, cfg.largoM, cfg.niveles, cfg.cuerpos, cfg.rejilla, cfg.panel, cfg.pie);
  // Cotas dimensionales en el modelo 3D
  const totalLenPic = cfg.largoM * cfg.cuerpos;
  agregarCotas(grupo, totalLenPic, cfg.fondoM, cfg.altoM, 400, cfg.largoM);
  // Cotas de claros entre niveles
  const alturasManPicC = getAlturasManualesM('picking');
  const alturasYPic = [];
  if(alturasManPicC){
    for(const y of alturasManPicC) alturasYPic.push(Math.min(y, cfg.altoM - 0.10));
  } else {
    const yIniP = 0.30, yTopP = cfg.altoM - 0.15;
    const pasoP = cfg.niveles > 1 ? (yTopP - yIniP) / (cfg.niveles - 1) : 0;
    for(let n=0; n<cfg.niveles; n++) alturasYPic.push(yIniP + pasoP * n);
  }
  agregarCotasClaros(grupo, alturasYPic, -totalLenPic/2 - 0.30, cfg.fondoM/2 + 0.05);
  targetY = cfg.altoM * 0.46;
  const totalLen = cfg.largoM * cfg.cuerpos;
  camDist = Math.max(cfg.altoM*1.4 + 1.0, totalLen*0.85 + 1.2, cfg.fondoM*1.5 + 1.2);
  document.getElementById('dims').innerHTML =
    'Picking · Largo <b>'+totalLen.toFixed(2)+' m</b> · Alto <b>'+cfg.altoM.toFixed(2)+' m</b> · '+
    cfg.cuerpos+' cuerpo'+(cfg.cuerpos>1?'s':'')+' · '+cfg.niveles+' niv';
  document.getElementById('medidasResumen').innerHTML =
    '<b>Picking</b><br>'+
    'Largo <b>'+totalLen.toFixed(2)+' m</b> · Alto <b>'+cfg.altoM.toFixed(2)+' m</b> · Fondo <b>'+cfg.fondoM.toFixed(2)+' m</b><br>'+
    'Cuerpos de <b>'+cfg.largoCm+' cm</b> · '+cfg.niveles+' niveles · '+cfg.cuerpos+' cuerpo'+(cfg.cuerpos>1?'s':'');
}

function buildSelectivo(){
  const cfg = getConfigSel();
  if(!MARCOS_SEL[cfg.altoIn] || !MARCOS_SEL[cfg.altoIn][cfg.fondoIn]){
    if(cfg.altoIn===336 && cfg.fondoIn===36){
      document.getElementById('selFondo').value = '42';
      build(); return;
    }
  }
  if(cfg.filas === 2){
    // Separación entre las espaldas de las 2 filas = unión seleccionada
    const centroFila = cfg.fondoM/2 + cfg.unionM/2;
    const filaA = new THREE.Group();
    buildRackSelectivo(filaA, cfg.altoM, cfg.fondoM, cfg.vigaM, cfg.niveles, cfg.cuerpos, cfg.rejilla, cfg.triplay, cfg.botas);
    filaA.position.z = centroFila; grupo.add(filaA);
    const filaB = new THREE.Group();
    buildRackSelectivo(filaB, cfg.altoM, cfg.fondoM, cfg.vigaM, cfg.niveles, cfg.cuerpos, cfg.rejilla, cfg.triplay, cfg.botas);
    filaB.position.z = -centroFila; grupo.add(filaB);
    // Uniones horizontales entre las 2 filas — 3 por cada par de marcos (arriba, medio, abajo)
    const nMarcosU = cfg.cuerpos + 1;
    const totalLenU = cfg.vigaM * cfg.cuerpos;
    const x0U = -totalLenU/2;
    const yPositions = [cfg.altoM * 0.15, cfg.altoM * 0.5, cfg.altoM * 0.90];
    for(let k=0; k<nMarcosU; k++){
      const xM = x0U + k * cfg.vigaM;
      yPositions.forEach(yU => {
        const union = box(0.035, 0.035, cfg.unionM, matMarcoSel);
        union.position.set(xM, yU, 0);
        grupo.add(union);
      });
    }
  } else {
    buildRackSelectivo(grupo, cfg.altoM, cfg.fondoM, cfg.vigaM, cfg.niveles, cfg.cuerpos, cfg.rejilla, cfg.triplay, cfg.botas);
  }
  targetY = cfg.altoM * 0.46;
  const totalLen = cfg.vigaM * cfg.cuerpos;
  const profTotal = cfg.fondoM * cfg.filas + (cfg.filas===2 ? cfg.unionM : 0);
  camDist = Math.max(cfg.altoM*1.4 + 1.2, totalLen*0.85 + 1.5, profTotal*1.5 + 1.5);
  const filaTxt = cfg.filas===2 ? '2 filas (doble)' : '1 fila (sencilla)';
  document.getElementById('dims').innerHTML =
    filaTxt+' · Largo <b>'+totalLen.toFixed(2)+' m</b> · Alto <b>'+cfg.altoM.toFixed(2)+' m</b> · '+
    cfg.cuerpos+' cuerpo'+(cfg.cuerpos>1?'s':'')+' · '+cfg.niveles+' niv';
  // Capacidad según viga seleccionada (kg por par de vigas)
  const capSel = cfg.vigaCapKg;
  document.getElementById('medidasResumen').innerHTML =
    '<b>Selectivo · '+filaTxt+'</b><br>'+
    'Largo <b>'+totalLen.toFixed(2)+' m</b> · Alto <b>'+cfg.altoM.toFixed(2)+' m</b> · Fondo <b>'+profTotal.toFixed(2)+' m</b><br>'+
    'Viga <b>'+cfg.vigaIn+'" × '+cfg.vigaAltIn+'"</b> · '+cfg.niveles+' niveles · '+cfg.cuerpos+' cuerpo'+(cfg.cuerpos>1?'s':'')+'<br>'+
    'Capacidad <b style="color:#da6635">'+capSel.toLocaleString()+' kg</b> / <b style="color:#da6635">'+cfg.vigaCapLb.toLocaleString()+' lb</b> por nivel';
  agregarCotas(grupo, totalLen, profTotal, cfg.altoM, capSel, cfg.vigaM);
  // Cotas de claros entre niveles
  const alturasManSelC = getAlturasManualesM('selectivo');
  const alturasYSel = [];
  if(alturasManSelC){
    for(const y of alturasManSelC) alturasYSel.push(Math.min(y, cfg.altoM - 0.10));
  } else {
    const yV0 = 0.40, yVT = cfg.altoM - 0.20;
    const pasoS = cfg.niveles > 1 ? (yVT - yV0) / (cfg.niveles - 1) : 0;
    for(let n=0; n<cfg.niveles; n++) alturasYSel.push(yV0 + pasoS * n);
  }
  agregarCotasClaros(grupo, alturasYSel, -totalLen/2 - 0.30, profTotal/2 + 0.05);
}

function build(){
  if(grupo) scene.remove(grupo);
  grupo = new THREE.Group();
  if(sistemaActual === 'selectivo') buildSelectivo();
  else if(sistemaActual === 'picking') buildPicking();
  else buildGondola();
  // Muñeco Isaac al lado izquierdo del rack (referencia de escala 1.75 m)
  // Calcular el extremo izquierdo del modelo según el sistema
  let extremoIzq = 0.6;
  if(sistemaActual === 'selectivo'){
    const cfg = getConfigSel();
    extremoIzq = cfg.vigaM * cfg.cuerpos / 2 + 1.1;
  } else if(sistemaActual === 'picking'){
    const cfg = getConfigPic();
    extremoIzq = cfg.largoM * cfg.cuerpos / 2 + 1.0;
  } else {
    const m = MED[document.getElementById('medida').value];
    const mods = parseInt(document.getElementById('modulos').value);
    extremoIzq = (m.ancho * mods) / 2 + 1.0;
  }
  buildPersonaIsaac(grupo, -extremoIzq, 0.3);
  // Ajustar cámara para que el muñeco quepa
  camDist = Math.max(camDist, extremoIzq + 1.8);
  scene.add(grupo);
  renderCotizacion();
}

function calcularBomGondola(){
  const tipo = document.getElementById('tipo').value;
  const m = MED[document.getElementById('medida').value];
  const niv = parseInt(document.getElementById('niveles').value);
  const mods = parseInt(document.getElementById('modulos').value);
  const cabs = parseInt(document.getElementById('cabeceras').value);
  const items = {}; const orden = [];
  function add(sku, q){
    if(items[sku]===undefined){ items[sku]=0; orden.push(sku); }
    items[sku] += q;
  }
  const c = tipo==='central', mul = c?2:1, A = m.anchoCm, a211 = m.pilar==='211';
  const postesC = mods+1;
  add('PILAR '+m.pilar+'CM', postesC);
  add('BRAZO', (niv-1)*2*mul*mods);
  add('CHAROLA '+A+'CM X 47CM', niv*mul*mods);
  add('PANEL TRASERO '+A+'CMX40CM', (a211?5:3)*2*mods);
  if(!a211) add('PANEL TRASERO '+A+'CMX10CM', 2*mods);
  add('BASE', (c?2:1)*postesC);
  add('PORTA PRECIO '+A+'CM', niv*mul*mods);
  add('CUBRE POLVO '+A+'CM', (c?2:1)*mods);
  add('CUBIERTA SUPERIOR '+A+'CM', mods);
  if(cabs>0){
    add('PILAR '+CAB.pilar+'CM', 2*cabs);
    add('BRAZO', (niv-1)*2*cabs);
    add('CHAROLA '+CAB.anchoCm+'CM X 47CM', niv*cabs);
    add('PANEL TRASERO '+CAB.anchoCm+'CMX40CM', 3*2*cabs);   // 2 caras
    add('PANEL TRASERO '+CAB.anchoCm+'CMX10CM', 1*2*cabs);
    add('BASE', 2*cabs);
    add('PORTA PRECIO '+CAB.anchoCm+'CM', niv*cabs);
    add('CUBRE POLVO '+CAB.anchoCm+'CM', 1*cabs);
    add('CUBIERTA SUPERIOR '+CAB.anchoCm+'CM', cabs);
  }
  return orden.map(k=>[k, items[k]]);
}

function calcularBomPicking(){
  const cfg = getConfigPic();
  const items = {}; const orden = [];
  function add(sku, q){
    if(!sku || q<=0) return;
    if(items[sku]===undefined){ items[sku]=0; orden.push(sku); }
    items[sku] += q;
  }
  const nMarcos = cfg.cuerpos + 1;
  // 1) Marcos picking (alto × fondo)
  const marcoSku = MARCOS_PIC[cfg.altoIn] && MARCOS_PIC[cfg.altoIn][cfg.fondoIn];
  add(marcoSku, nMarcos);
  // 2) Pies de poste: 2 por marco
  if(cfg.pie) add(PIE_POSTE_PIC, 2 * nMarcos);
  // 3) Vigas/travesaños: 2 por nivel por cuerpo (frente + atrás)
  add(VIGAS_PIC[cfg.largoCm], 2 * cfg.niveles * cfg.cuerpos);
  // 4) Carga del nivel:
  //    - Si pidió rejilla Y el largo la tiene (100 o 120): usar rejilla
  //    - Si pidió panel O el largo no tiene rejilla: usar panel galv del largo apropiado
  if(cfg.rejilla && tieneRejillaPicking(cfg.largoCm)){
    const combo = REJILLAS_COMBO_PIC[cfg.largoCm];
    const skuRej = REJILLAS_PIC[combo.tipo] && REJILLAS_PIC[combo.tipo][cfg.fondoIn];
    add(skuRej, combo.cantidad * cfg.niveles * cfg.cuerpos);
  } else if(cfg.panel || (cfg.rejilla && !tieneRejillaPicking(cfg.largoCm))){
    // Panel beige 8 ft cortado a la medida — 1 panel por nivel por cuerpo
    const skuPanel = PANELES_BEIGE_PIC[cfg.fondoIn];
    add(skuPanel, cfg.niveles * cfg.cuerpos);
  }
  return orden.map(sku => [sku, items[sku]]);
}

function calcularBomSelectivo(){
  const cfg = getConfigSel();
  const items = {}; const orden = [];
  function add(sku, q){
    if(!sku || q<=0) return;
    if(items[sku]===undefined){ items[sku]=0; orden.push(sku); }
    items[sku] += q;
  }
  const F = cfg.filas;
  const nMarcosTotal = (cfg.cuerpos + 1) * F;
  const marcoSku = MARCOS_SEL[cfg.altoIn] && MARCOS_SEL[cfg.altoIn][cfg.fondoIn];
  add(marcoSku, nMarcosTotal);
  add(cfg.vigaSku, 2 * cfg.niveles * cfg.cuerpos * F);
  add(ANCLA_STD_SEL, 4 * nMarcosTotal);
  if(cfg.rejilla){
    add(REJILLAS_SEL[cfg.fondoIn], REJILLAS_POR_VIGA_SEL[cfg.vigaIn] * cfg.niveles * cfg.cuerpos * F);
  }
  if(cfg.triplay){
    add(TRIPLAY_SEL, TRIPLAY_POR_VIGA_SEL[cfg.vigaIn] * cfg.niveles * cfg.cuerpos * F);
    add(SOPORTE_TRIPLAY_SEL, 3 * cfg.niveles * cfg.cuerpos * F);
  }
  if(cfg.botas) add(BOTA_SEL, 2 * nMarcosTotal);
  // Uniones para rack doble (3 por par de marcos)
  if(cfg.filas === 2){
    const skuUnion = UNIONES_SEL[cfg.unionIn];
    if(skuUnion) add(skuUnion, 3 * (cfg.cuerpos + 1));
  }
  return orden.map(sku => [sku, items[sku]]);
}

function calcularBOM(){
  if(sistemaActual === 'selectivo') return calcularBomSelectivo();
  if(sistemaActual === 'picking')   return calcularBomPicking();
  return calcularBomGondola();
}

function renderCotizacion(){
  if(!preciosCache) return;
  const bom = calcularBOM();
  // Cálculo interno SIEMPRE en USD; convertir solo al formatear
  const tc = monedaSel==='MXN' ? tcCache : 1;
  const sym = monedaSel==='MXN' ? '$' : 'US$';
  const fmt = usd => sym + (usd*tc).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

  let materialUSD = 0;
  let piezasTot = 0;
  let lineas = bom.map(item=>{
    if(!Array.isArray(item)){
      const impUSD = item.precioUSD * item.cantidad;
      materialUSD += impUSD;
      piezasTot += item.cantidad;
      return { sku:item.sku, producto:item.producto, cantidad:item.cantidad, precioUSD:item.precioUSD, importeUSD:impUSD };
    }
    const [key, cant] = item;
    const inv = preciosCache[key];
    const puUSD = inv ? inv.precio : 0;
    const impUSD = puUSD * cant;
    materialUSD += impUSD;
    piezasTot += cant;
    const sku = inv ? inv.sku : (key.startsWith('PIC-')||key.startsWith('GON-')||key.startsWith('ACC-')||key.startsWith('SEL-') ? key : '—');
    const producto = inv ? (inv.producto||key) : key;
    return { sku, producto, cantidad:cant, precioUSD:puUSD, importeUSD:impUSD };
  });

  // PICKING con color azul: recargo del 15% sobre material
  if(sistemaActual === 'picking'){
    const colorPic = document.getElementById('colorRack')?.value || 'verde';
    if(colorPic === 'azul'){
      const recargoUSD = materialUSD * 0.15;
      materialUSD += recargoUSD;
      lineas.push({
        sku: 'REC-AZUL',
        producto: 'RECARGO POR COLOR AZUL (15% sobre material)',
        cantidad: 1,
        precioUSD: recargoUSD,
        importeUSD: recargoUSD
      });
    }
  }

  // GÓNDOLA: agrupar todo el material en 1 sola línea "Góndola [tipo] [medida]"
  // Guardamos el desglose para el PDF
  window._desgloseGondola = null;
  if(sistemaActual === 'gondola'){
    const cfgRes = configResumen();
    const cantModulos = Math.max(1, parseInt(cfgRes.modulos||1) + parseInt(cfgRes.cabeceras||0));
    const precioUnit = materialUSD / cantModulos;
    const nombreGondola = 'GÓNDOLA ' + (cfgRes.tipo||'').toUpperCase() + ' · ' + (cfgRes.medida||'') + ' · ' + (cfgRes.niveles||'') + ' NIVELES';
    // Guardar desglose de piezas para el PDF (sin flete/instalación)
    window._desgloseGondola = lineas.slice();
    // Reemplazar todas las líneas con 1 sola línea agrupada
    lineas = [{
      sku: '—',
      producto: nombreGondola,
      cantidad: cantModulos,
      precioUSD: precioUnit,
      importeUSD: materialUSD,
      _esGondolaAgrupada: true
    }];
  }
  // Flete como línea más del listado (no en el total)
  const fleteUSD = requiereEnvio ? calcularFlete(materialUSD).flete : 0;
  if(requiereEnvio){
    lineas.push({ sku:'SEL-0305', producto:'SERVICIO DE FLETE', cantidad:1, precioUSD:fleteUSD, importeUSD:fleteUSD });
  }
  const instalacionUSD = requiereInstalacion ? calcularInstalacion(materialUSD) : 0;
  if(requiereInstalacion){
    lineas.push({ sku:'SRV-INST', producto:'SERVICIO DE INSTALACION', cantidad:1, precioUSD:instalacionUSD, importeUSD:instalacionUSD });
  }
  const subtotalUSD = materialUSD + fleteUSD + instalacionUSD;
  const ivaUSD = subtotalUSD * (IVA_FIJO/100);
  const totalUSD = subtotalUSD + ivaUSD;

  const badgeStock = (l) => {
    if(l.stock === null || l.stock === undefined) return '';
    if(l.bajoPedido) return '<span class="stk stk-p">📦 Bajo pedido</span>';
    if(l.stock >= l.cantidad) return `<span class="stk stk-ok">✓ En stock (${l.stock})</span>`;
    if(l.stock > 0) return `<span class="stk stk-par">⚠ Parcial (${l.stock}/${l.cantidad})</span>`;
    return '<span class="stk stk-no">✗ Sin stock</span>';
  };
  document.getElementById('lista').innerHTML = lineas.map(l=>`
    <div class="li">
      <div>
        <div class="sku">${l.sku}</div>
        <div class="prd">${l.producto}</div>
        <div class="pu">${fmt(l.precioUSD)} / pza ${badgeStock(l)}</div>
      </div>
      <div>
        <div class="qy">${l.cantidad}</div>
        <div class="im">${fmt(l.importeUSD)}</div>
      </div>
    </div>
  `).join('');

  // Stats
  if(sistemaActual === 'selectivo'){
    const cfg = getConfigSel();
    const filaLbl = cfg.filas===2 ? 'Doble' : 'Sencilla';
    document.getElementById('stats').innerHTML = `
      <div class="s"><div class="v">${filaLbl}</div><div class="l">Tipo</div></div>
      <div class="s"><div class="v">${cfg.cuerpos}×${cfg.niveles}</div><div class="l">Cuerpos×Niv</div></div>
      <div class="s"><div class="v">${piezasTot}</div><div class="l">Piezas</div></div>
    `;
  } else if(sistemaActual === 'picking'){
    const cfg = getConfigPic();
    document.getElementById('stats').innerHTML = `
      <div class="s"><div class="v">${cfg.largoCm}cm</div><div class="l">Cuerpo</div></div>
      <div class="s"><div class="v">${cfg.cuerpos}×${cfg.niveles}</div><div class="l">Cuerpos×Niv</div></div>
      <div class="s"><div class="v">${piezasTot}</div><div class="l">Piezas</div></div>
    `;
  } else {
    const mods = parseInt(document.getElementById('modulos').value);
    const cabs = parseInt(document.getElementById('cabeceras').value);
    const niv = parseInt(document.getElementById('niveles').value);
    document.getElementById('stats').innerHTML = `
      <div class="s"><div class="v">${mods+cabs}</div><div class="l">Módulos</div></div>
      <div class="s"><div class="v">${niv}</div><div class="l">Niveles</div></div>
      <div class="s"><div class="v">${piezasTot}</div><div class="l">Piezas</div></div>
    `;
  }

  document.getElementById('totales').innerHTML = `
    <div class="tr"><span>Moneda</span>
      <select id="selMon"><option value="MXN"${monedaSel==='MXN'?' selected':''}>MXN</option><option value="USD"${monedaSel==='USD'?' selected':''}>USD</option></select>
    </div>
    <div class="tr" style="align-items:center">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12.5px">
        <input type="checkbox" id="chkEnvio" ${requiereEnvio?'checked':''} style="width:15px;height:15px;accent-color:#da6635">
        Requiere envío
      </label>
      <span style="font-size:11.5px;color:#6a6f75">${requiereEnvio ? fmt(fleteUSD) : '—'}</span>
    </div>
    <div class="tr" style="align-items:center">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12.5px">
        <input type="checkbox" id="chkInst" ${requiereInstalacion?'checked':''} style="width:15px;height:15px;accent-color:#da6635">
        Requiere instalación
      </label>
      <span style="font-size:11.5px;color:#6a6f75">${requiereInstalacion ? fmt(instalacionUSD) : '—'}</span>
    </div>
    <div class="tr"><span>Subtotal</span><span>${fmt(subtotalUSD)}</span></div>
    <div class="tr"><span>IVA ${IVA_FIJO}%</span><span>${fmt(ivaUSD)}</span></div>
    <div class="tr gd"><span>Total ${monedaSel}</span><span>${fmt(totalUSD)}</span></div>

async function sbFetch(path){
  const r = await fetch(SB_URL+'/rest/v1/'+path, {
    headers:{ apikey:SB_KEY, Authorization:'Bearer '+SB_KEY }
  });
  if(!r.ok) throw new Error('Supabase '+r.status);
  return r.json();
}

async function sbInsertVenta(body){
  const r = await fetch(SB_URL+'/rest/v1/ventas', {
    method:'POST',
    headers:{ apikey:SB_KEY, Authorization:'Bearer '+SB_KEY, 'Content-Type':'application/json', Prefer:'return=minimal' },
    body: JSON.stringify(body)
  });
  if(r.ok) return true;
  if(r.status === 409){
    // Folio duplicado (rarísimo), reintenta con sufijo random
    body.num = body.num + '-' + Math.random().toString(36).slice(2,5).toUpperCase();
    const r2 = await fetch(SB_URL+'/rest/v1/ventas', {
      method:'POST',
      headers:{ apikey:SB_KEY, Authorization:'Bearer '+SB_KEY, 'Content-Type':'application/json', Prefer:'return=minimal' },
      body: JSON.stringify(body)
    });
    return r2.ok;
  }
  console.error('sbInsertVenta', r.status, await r.text());
  return false;
}

async function cargarPrecios(){
  if(preciosCache) return preciosCache;
  const data = await sbFetch("inventario?sistema=in.(GONDOLAS,PICKING,SELECTIVO)&select=sku,producto,precio,sistema,cantidad");
  const map = {};
  inventarioArr = [];
  for(const row of data){
    const item = { sku:row.sku, producto:row.producto, precio:parseFloat(row.precio), sistema:row.sistema, cantidad:parseInt(row.cantidad)||0 };
    map[row.producto] = item;
    map[row.sku] = item;
    inventarioArr.push(item);
  }
  preciosCache = map;
  // Cargar también el material comprometido en pedidos activos (no bloqueante)
  cargarComprometido().catch(e=>console.warn('comprometido:',e));
  try{ actualizarStockEnDropdowns(); }catch(e){ console.warn(e); }
  return map;
}

// Mapa de cantidades comprometidas por SKU y por producto (nombre)
// (mismos criterios que ISA-OS _comprometidoSKU)
let compBySku = {};
let compByProd = {};
async function cargarComprometido(){
  try{
    // Traer pedidos activos con inventario descontado
    const url = "orders?select=cotData,estatus,entregado,inventarioDescontado&inventarioDescontado=eq.true&estatus=not.in.(Cancelado,Completado,cancelado,completado)&entregado=neq.si";
    const rows = await sbFetch(url);
    const bySku = {}, byProd = {};
    for(const o of rows){
      const lineas = (o.cotData && Array.isArray(o.cotData.lineas)) ? o.cotData.lineas : [];
      for(const l of lineas){
        if(!l || l.tipo) continue;
        const cnt = Number(l.cantidad||0);
        if(!cnt) continue;
        if(l.sku){ bySku[l.sku] = (bySku[l.sku]||0) + cnt; }
        if(l.producto){ const k = (''+l.producto).toLowerCase().trim(); byProd[k] = (byProd[k]||0) + cnt; }
      }
    }
    compBySku = bySku;
    compByProd = byProd;
    console.log('Comprometido cargado:', Object.keys(bySku).length, 'SKUs');
    actualizarStockEnDropdowns();
  }catch(e){ console.error('cargarComprometido:', e); }
}

// Comprometido para un SKU (busca por sku y por nombre de producto)
function comprometidoDe(item){
  if(!item) return 0;
  const sku = item.sku||'';
  const prod = (''+(item.producto||'')).toLowerCase().trim();
  return (compBySku[sku]||0) + (prod && !compBySku[sku] ? (compByProd[prod]||0) : 0);
}

// Cuántos marcos se pueden FABRICAR con los componentes en stock (descontando comprometidos)
// Toma en cuenta el color Y la medida del fondo (para que las diagonales que se usen sean del fondo correcto)
function marcosFabricables(altoIn, fondoIn, color){
  if(!inventarioArr) return 0;
  const bom = MARCO_BOM[String(altoIn)];
  if(!bom) return 0;
  const colorUp = (color||'VERDE').toUpperCase();
  const fondoStr = String(fondoIn||42);

  const dispReal = (item)=>Math.max(0, Number(item.cantidad||0) - comprometidoDe(item));

  // Postes del tamaño y color
  const postes = inventarioArr.filter(p=>{
    const u = (p.producto||'').toUpperCase();
    return u.includes('POSTE') && u.includes(bom.posteSize+'"') && u.includes(colorUp);
  }).reduce((s,p)=>s+dispReal(p),0);

  // Diagonales D y H — el nombre real es "D DIAGONAL" y "H DIAGONAL" (letra primero)
  // Además filtramos por medida del fondo (36, 42, 48)
  const buscarDiag = (letra)=>inventarioArr.filter(p=>{
    const u = (p.producto||'').toUpperCase();
    return u.includes(letra + ' DIAGONAL') && u.includes(fondoStr+'"') && u.includes(colorUp);
  }).reduce((s,p)=>s+dispReal(p),0);
  const diagD = buscarDiag('D');
  const diagH = buscarDiag('H');

  // Pies del color
  const pies = inventarioArr.filter(p=>{
    const u = (p.producto||'').toUpperCase();
    return (u.includes('PIE BASE') || u.includes('PIE ')) && u.includes(colorUp);
  }).reduce((s,p)=>s+dispReal(p),0);

  const maxPostes = Math.floor((postes * bom.postePartes) / 1);
  const maxDiagD  = bom.diagonalD > 0 ? Math.floor(diagD / bom.diagonalD) : Infinity;
  const maxDiagH  = bom.diagonalH > 0 ? Math.floor(diagH / bom.diagonalH) : Infinity;
  const maxPies   = bom.pie      > 0 ? Math.floor(pies  / bom.pie)      : Infinity;

  return Math.max(0, Math.min(maxPostes, maxDiagD, maxDiagH, maxPies));
}

function disponibleMarco(sku, altoIn, fondoIn, color){
  const item = preciosCache ? preciosCache[sku] : null;
  const armadosDisp = item ? Math.max(0, Number(item.cantidad||0) - comprometidoDe(item)) : 0;
  const fabricables = marcosFabricables(altoIn, fondoIn, color);
  return armadosDisp + fabricables;
}

// Devuelve stock físico del SKU, o null si no está cargado
function stockDe(sku){
  if(!preciosCache) return null;
  const item = preciosCache[sku];
  return item ? item.cantidad : null;
}
// Stock disponible = físico - comprometido (para SKUs sin fabricación desde componentes)
function stockDisponibleDe(sku){
  if(!preciosCache) return null;
  const item = preciosCache[sku];
  if(!item) return null;
  return Math.max(0, Number(item.cantidad||0) - comprometidoDe(item));
}
function _fmtStockLabel(n){
  if(n===null||n===undefined) return '';
  if(n<=0) return ' · agotado';
  if(n>=1000) return ' · '+(Math.floor(n/100)/10)+'k disp.';
  return ' · '+n+' disp.';
}

// Repinta cada dropdown clave con la existencia de su SKU asociado
function actualizarStockEnDropdowns(){
  if(!preciosCache) return;
  // 1) Vigas Selectivo (SKU directo en value) - considera comprometido
  const viga = document.getElementById('selViga');
  if(viga){
    Array.from(viga.options).forEach(opt=>{
      if(!opt.dataset.baseLabel) opt.dataset.baseLabel = opt.textContent;
      opt.textContent = opt.dataset.baseLabel + _fmtStockLabel(stockDisponibleDe(opt.value));
    });
  }
  // 2) Alto Selectivo: el SKU depende de (alto, fondo). Se pinta contra el fondo actual.
  const alto = document.getElementById('selAlto');
  const fondo = document.getElementById('selFondo');
  const colorSel = (document.getElementById('colorRack')?.value || 'VERDE').toUpperCase().includes('AZUL') ? 'AZUL' : 'VERDE';
  if(alto && fondo){
    const fondoActual = parseInt(fondo.value);
    Array.from(alto.options).forEach(opt=>{
      if(!opt.dataset.baseLabel) opt.dataset.baseLabel = opt.textContent;
      const altoIn = parseInt(opt.value);
      const sku = (typeof MARCOS_SEL !== 'undefined' && MARCOS_SEL[altoIn] && MARCOS_SEL[altoIn][fondoActual]) || null;
      const total = disponibleMarco(sku, altoIn, fondoActual, colorSel);
      opt.textContent = opt.dataset.baseLabel + _fmtStockLabel(total);
    });
    // 3) Fondo Selectivo: mismo tema pero contra el alto actual
    const altoActual = parseInt(alto.value);
    Array.from(fondo.options).forEach(opt=>{
      if(!opt.dataset.baseLabel) opt.dataset.baseLabel = opt.textContent;
      const fondoIn = parseInt(opt.value);
      const sku = (typeof MARCOS_SEL !== 'undefined' && MARCOS_SEL[altoActual] && MARCOS_SEL[altoActual][fondoIn]) || null;
      const total = disponibleMarco(sku, altoActual, fondoIn, colorSel);
      opt.textContent = opt.dataset.baseLabel + _fmtStockLabel(total);
    });
  }
  // 4) Picking - alto/fondo/largo: SKU en MARCOS_PIC[alto][fondo] + VIGAS_PIC[largoCm]
  const picAlto = document.getElementById('picAlto');
  const picFondo = document.getElementById('picFondo');
  const picLargo = document.getElementById('picLargo');
  if(picAlto && picFondo){
    const fondoIn = parseInt(picFondo.value);
    Array.from(picAlto.options).forEach(opt=>{
      if(!opt.dataset.baseLabel) opt.dataset.baseLabel = opt.textContent;
      const altoIn = parseInt(opt.value);
      const sku = (typeof MARCOS_PIC !== 'undefined' && MARCOS_PIC[altoIn] && MARCOS_PIC[altoIn][fondoIn]) || null;
      opt.textContent = opt.dataset.baseLabel + (sku ? _fmtStockLabel(stockDisponibleDe(sku)) : '');
    });
    const altoIn = parseInt(picAlto.value);
    Array.from(picFondo.options).forEach(opt=>{
      if(!opt.dataset.baseLabel) opt.dataset.baseLabel = opt.textContent;
      const fIn = parseInt(opt.value);
      const sku = (typeof MARCOS_PIC !== 'undefined' && MARCOS_PIC[altoIn] && MARCOS_PIC[altoIn][fIn]) || null;
      opt.textContent = opt.dataset.baseLabel + (sku ? _fmtStockLabel(stockDisponibleDe(sku)) : '');
    });
  }
  if(picLargo){
    Array.from(picLargo.options).forEach(opt=>{
      if(!opt.dataset.baseLabel) opt.dataset.baseLabel = opt.textContent;
      const largoCm = parseInt(opt.value);
      const sku = (typeof VIGAS_PIC !== 'undefined' && VIGAS_PIC[largoCm]) || null;
      opt.textContent = opt.dataset.baseLabel + (sku ? _fmtStockLabel(stockDisponibleDe(sku)) : '');
    });
  }
}
