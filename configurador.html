function captura3D(){
  try{
    let xExt, zExt, alto;
    if(sistemaActual === 'selectivo'){
      const cfg = getConfigSel();
      xExt = cfg.vigaM * cfg.cuerpos;
      zExt = cfg.fondoM * cfg.filas + (cfg.filas===2 ? cfg.unionM : 0);
      alto = cfg.altoM;
    } else if(sistemaActual === 'picking'){
      const cfg = getConfigPic();
      xExt = cfg.largoM * cfg.cuerpos;
      zExt = cfg.fondoM;
      alto = cfg.altoM;
    } else {
      const m = MED[document.getElementById('medida').value];
      const mods = parseInt(document.getElementById('modulos').value);
      const cabs = parseInt(document.getElementById('cabeceras').value);
      const central = document.getElementById('tipo').value === 'central';
      const totalW = m.ancho * mods;
      zExt = cabs ? CAB.ancho : (central ? m.fondo*1.75 : m.fondo);
      xExt = totalW + (cabs ? CAB.fondo*2 : 0);
      alto = m.alto;
    }

    // Renderer offscreen dedicado
    const r2 = new THREE.WebGLRenderer({antialias:true, preserveDrawingBuffer:true});
    const cW = 1440, cH = 880;
    r2.setSize(cW, cH);
    r2.setPixelRatio(1);

    // Vista lateral 3/4 fija
    const FOV = 35;
    const cam2 = new THREE.PerspectiveCamera(FOV, cW/cH, 0.1, 100);
    const rY = Math.PI * 0.22;
    const rX = 0.22;

    // Silueta proyectada del bounding box rotado (independiente del tamaño de góndola)
    const projX = xExt * Math.cos(rY) + zExt * Math.sin(rY);
    const projY = alto + (xExt * Math.sin(rY) + zExt * Math.cos(rY)) * Math.sin(rX);
    const fovRad = FOV * Math.PI / 180;
    const aspect = cW / cH;
    const FILL = 0.70;  // la góndola ocupa ~70% del frame (deja margen)
    const distY = projY / (2 * Math.tan(fovRad/2) * FILL);
    const distX = projX / (2 * Math.tan(fovRad/2) * aspect * FILL);
    const dist = Math.max(distY, distX, 1.2);
    const tY = alto * 0.5;

    const cx = Math.cos(rX);
    cam2.position.set(
      Math.sin(rY)*cx*dist,
      Math.sin(rX)*dist + tY,
      Math.cos(rY)*cx*dist
    );
    cam2.lookAt(0, tY, 0);

    const savedBg = scene.background;
    scene.background = new THREE.Color(0xffffff);
    r2.render(scene, cam2);
    const dataUrl = r2.domElement.toDataURL('image/png');
    scene.background = savedBg;
    r2.dispose();
    return dataUrl;
  } catch(e){ console.error('captura3D:', e); return null; }
}

function generarPDF(datos){
  if(!preciosCache){ alert('Aún cargando precios.'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'pt', format:'letter'});
  const W = doc.internal.pageSize.getWidth();
  const H = doc.internal.pageSize.getHeight();
  const M = 40;
  const ORANGE = [218,102,53];
  const ORANGE_SOFT = [251,224,207];
  const DARK = [38,41,44];
  const GREY = [120,123,128];
  const GREY_BG = [245,246,247];

  // ── Cálculos ──
  const bom = calcularBOM();
  const tc = monedaSel==='MXN' ? tcCache : 1;
  const sym = monedaSel==='MXN' ? '$' : 'US$';
  const fmt = usd => sym + ' ' + (usd*tc).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  let materialUSD = 0, faltantes = [];
  const lineas = bom.map(item=>{
    if(!Array.isArray(item)){
      const impUSD = item.precioUSD * item.cantidad;
      materialUSD += impUSD;
      return { sku:item.sku, producto:item.producto, cantidad:item.cantidad, precioUSD:item.precioUSD, importeUSD:impUSD };
    }
    const [key, cant] = item;
    const inv = preciosCache[key];
    if(!inv) faltantes.push(key);
    const puUSD = inv ? inv.precio : 0;
    const impUSD = puUSD * cant;
    materialUSD += impUSD;
    const sku = inv ? inv.sku : (key.startsWith('PIC-')||key.startsWith('GON-')||key.startsWith('ACC-')||key.startsWith('SEL-') ? key : '—');
    const producto = inv ? (inv.producto||key) : key;
    return { sku, producto, cantidad:cant, precioUSD:puUSD, importeUSD:impUSD };
  });

  // PICKING con color azul: recargo del 15% sobre material (misma lógica que renderCotizacion)
  if(sistemaActual === 'picking'){
    const colorPic = document.getElementById('colorRack')?.value || 'verde';
    if(colorPic === 'azul'){
      const recargoUSD = materialUSD * 0.15;
      materialUSD += recargoUSD;
      lineas.push({
        sku: 'REC-AZUL',
        producto: 'RECARGO POR COLOR AZUL (15% sobre material)',
        cantidad: 1,
        precioUSD: recargoUSD,
        importeUSD: recargoUSD
      });
    }
  }

  // GÓNDOLA: colapsar en 1 sola línea y guardar el desglose para imprimirlo debajo
  let desgloseGondola = null;
  let lineasParaPDF = lineas;
  if(sistemaActual === 'gondola'){
    const cfgRes = configResumen();
    const cantModulos = Math.max(1, parseInt(cfgRes.modulos||1) + parseInt(cfgRes.cabeceras||0));
    const precioUnit = materialUSD / cantModulos;
    const nombreGondola = 'GÓNDOLA ' + (cfgRes.tipo||'').toUpperCase() + ' · ' + (cfgRes.medida||'') + ' · ' + (cfgRes.niveles||'') + ' NIVELES';
    desgloseGondola = lineas.slice();
    lineasParaPDF = [{
      sku: '—',
      producto: nombreGondola,
      cantidad: cantModulos,
      precioUSD: precioUnit,
      importeUSD: materialUSD
    }];
  }

  const fleteUSD = requiereEnvio ? calcularFlete(materialUSD).flete : 0;
  if(requiereEnvio){
    lineasParaPDF.push({ sku:'SEL-0305', producto:'SERVICIO DE FLETE', cantidad:1, precioUSD:fleteUSD, importeUSD:fleteUSD });
  }
  const instalacionUSD = requiereInstalacion ? calcularInstalacion(materialUSD) : 0;
  if(requiereInstalacion){
    lineasParaPDF.push({ sku:'SRV-INST', producto:'SERVICIO DE INSTALACION', cantidad:1, precioUSD:instalacionUSD, importeUSD:instalacionUSD });
  }
  const subtotalUSD = materialUSD + fleteUSD + instalacionUSD;
  const ivaUSD = subtotalUSD * (IVA_FIJO/100);
  const totalUSD = subtotalUSD + ivaUSD;
  const folioPrefix = sistemaActual==='selectivo' ? 'RW-' : (sistemaActual==='picking' ? 'PW-' : 'GW-');
  const folio = folioPrefix + (''+Date.now()).slice(-5);
  const fechaHoy = new Date();
  const fechaVenc = new Date(fechaHoy.getTime() + 15*24*60*60*1000);
  const dFmt = d => d.toLocaleDateString('es-MX', {day:'2-digit',month:'2-digit',year:'numeric'});

  // ── HEADER ──
  // Forma decorativa salmón en esquina superior derecha (elipse cortada por el borde)
  doc.setFillColor(...ORANGE_SOFT);
  doc.ellipse(W + 30, 25, 230, 110, 'F');

  // Logo real ISARACK
  try{ doc.addImage(LOGO_ISARACK, 'PNG', M, 14, 72, 72); } catch(e){ console.warn('Logo:', e); }

  // Slogan
  doc.setFont('helvetica','bold');
  doc.setFontSize(10);
  doc.setTextColor(...ORANGE);
  doc.text('EN TU ALMACEN; SEGURO!!', M, 100);

  // Datos empresa a la derecha
  doc.setTextColor(...DARK);
  doc.setFont('helvetica','bold');
  doc.setFontSize(11);
  doc.text('ISA RACK SA', W - M, 36, {align:'right'});
  doc.setFont('helvetica','normal');
  doc.setFontSize(9);
  doc.text('Lib. Salvador Rosas Magallon 202 Camino Verde', W - M, 52, {align:'right'});
  doc.text('Tijuana BC Mexico CP 22190', W - M, 66, {align:'right'});

  // ── CLIENTE + FOLIO ──
  let y = 128;
  doc.setFont('helvetica','bold');
  doc.setFontSize(12);
  doc.setTextColor(...DARK);
  doc.text((datos.cliente||'—').toUpperCase(), M, y);
  doc.setTextColor(...ORANGE);
  doc.setFontSize(20);
  doc.text('Presupuesto # ' + folio, W - M, y, {align:'right'});

  // ── BLOQUE DE FECHAS ──
  y = 148;
  const boxH = 46;
  doc.setDrawColor(220,222,225);
  doc.setLineWidth(0.5);
  doc.roundedRect(M, y, W - M*2, boxH, 5, 5, 'S');
  const colW = (W - M*2) / 3;
  doc.setFont('helvetica','normal');
  doc.setFontSize(9);
  doc.setTextColor(...GREY);
  doc.text('Fecha del presupuesto:', M + 12, y + 16);
  doc.text('Vencimiento', M + colW + 12, y + 16);
  doc.text('Comercial', M + colW*2 + 12, y + 16);
  doc.setTextColor(...DARK);
  doc.setFontSize(10);
  doc.text(dFmt(fechaHoy), M + 12, y + 33);
  doc.text(dFmt(fechaVenc), M + colW + 12, y + 33);
  doc.text('Isaac Romero', M + colW*2 + 12, y + 33);

  // ── CONFIGURACIÓN (franja gris con la config actual) ──
  y = y + boxH + 10;
  const cfg = configResumen();
  doc.setFillColor(...GREY_BG);
  doc.rect(M, y, W - M*2, 22, 'F');
  doc.setFont('helvetica','bold');
  doc.setFontSize(9);
  doc.setTextColor(...ORANGE);
  doc.text('CONFIGURACIÓN', M + 8, y + 14);
  doc.setTextColor(...DARK);
  doc.setFont('helvetica','normal');
  doc.text(cfg.txt, M + 110, y + 14);

  // ── TABLA ──
  y = y + 32;
  doc.autoTable({
    startY: y,
    head: [['DESCRIPCIÓN','CANTIDAD','PRECIO UNITARIO','IMPUESTOS','IMPORTE']],
    body: lineasParaPDF.map(l => [
      l.producto,
      l.cantidad + ' Unidades',
      fmt(l.precioUSD),
      'IVA('+IVA_FIJO+'%)',
      fmt(l.importeUSD)
    ]),
    margin:{left:M, right:M},
    theme:'plain',
    styles:{ fontSize:9, cellPadding:{top:4,right:6,bottom:4,left:6}, textColor:DARK },
    headStyles:{ textColor:GREY, fontStyle:'bold', fontSize:9, cellPadding:{top:5,right:6,bottom:5,left:6}, lineWidth:{bottom:0.5}, lineColor:[220,222,225] },
    bodyStyles:{ lineWidth:{bottom:0.5}, lineColor:[240,241,243] },
    columnStyles:{
      0:{cellWidth:190},
      1:{cellWidth:80, halign:'right'},
      2:{cellWidth:95, halign:'right'},
      3:{cellWidth:70, halign:'center', textColor:[170,90,75]},
      4:{cellWidth:'auto', halign:'right', fontStyle:'bold'}
    }
  });

  // ── DESGLOSE DE MATERIALES (solo para góndola) ──
  if(desgloseGondola && desgloseGondola.length){
    const yAfter = doc.lastAutoTable.finalY + 18;
    doc.setFontSize(9);
    doc.setTextColor(...ORANGE);
    doc.text('DESGLOSE DE MATERIALES', M, yAfter);
    doc.setDrawColor(...ORANGE);
    doc.setLineWidth(0.5);
    doc.line(M, yAfter+3, M+120, yAfter+3);
    doc.autoTable({
      startY: yAfter + 8,
      head: [['SKU','MATERIAL','CANT','P.UNIT.','IMPORTE']],
      body: desgloseGondola.map(l => [
        l.sku || '—',
        l.producto,
        String(l.cantidad),
        fmt(l.precioUSD),
        fmt(l.importeUSD)
      ]),
      margin:{left:M, right:M},
      theme:'plain',
      styles:{ fontSize:7.5, cellPadding:{top:2.5,right:5,bottom:2.5,left:5}, textColor:GREY },
      headStyles:{ textColor:GREY, fontStyle:'bold', fontSize:7.5, cellPadding:{top:3,right:5,bottom:3,left:5}, lineWidth:{bottom:0.4}, lineColor:[230,232,235] },
      bodyStyles:{ lineWidth:{bottom:0.3}, lineColor:[245,246,248] },
      columnStyles:{
        0:{cellWidth:55, textColor:ORANGE, fontStyle:'bold'},
        1:{cellWidth:'auto'},
        2:{cellWidth:35, halign:'right'},
        3:{cellWidth:75, halign:'right'},
        4:{cellWidth:75, halign:'right', textColor:DARK}
      }
    });
  }

  let fy = doc.lastAutoTable.finalY + 16;

  // ── RENDER 3D (izq) + TOTALES (der) ──
  const totW = 250;
  const totX = W - M - totW;
  const imgW = totX - M - 20;
  const imgH = 110;

  const img3D = captura3D();
  if(img3D){ try{ doc.addImage(img3D, 'PNG', M, fy, imgW, imgH); } catch(e){} }

  let ty = fy;
  doc.setFillColor(...GREY_BG);
  doc.rect(totX, ty, totW, 32, 'F');
  doc.setFont('helvetica','normal');
  doc.setFontSize(11);
  doc.setTextColor(...DARK);
  doc.text('Importe base', totX + 14, ty + 20);
  doc.text(fmt(subtotalUSD), totX + totW - 14, ty + 20, {align:'right'});
  ty += 32;

  doc.setFillColor(...GREY_BG);
  doc.rect(totX, ty, totW, 32, 'F');
  doc.text('IVA '+IVA_FIJO+'%', totX + 14, ty + 20);
  doc.text(fmt(ivaUSD), totX + totW - 14, ty + 20, {align:'right'});
  ty += 32;

  doc.setFillColor(...ORANGE);
  doc.rect(totX, ty, totW, 32, 'F');
  doc.setFont('helvetica','bold');
  doc.setTextColor(255,255,255);
  doc.setFontSize(12);
  doc.text('Total', totX + 14, ty + 20);
  doc.text(fmt(totalUSD), totX + totW - 14, ty + 20, {align:'right'});
  ty += 32;

  fy = Math.max(fy + imgH, ty) + 18;

  // ── CONDICIONES (PIE) ──
  if(fy > H - 140){ doc.addPage(); fy = M; }
  const condiciones = [
    ['PRECIOS EN '+monedaSel, ''],
    ['TIPO DE CAMBIO:', ' DEL DIARIO OFICIAL AL DIA DEL PAGO EN MXN'],
    ['TIEMPO DE ENTREGA:', ' 5 A 6 DIAS HABILES'],
    ['INCLUYE INSTALACION:', ' NO'],
    ['ENTREGA A DOMICILIO:', datos.dir ? ' SI · '+datos.dir : ' CONSULTAR'],
    ['MANIOBRA DE DESCARGA:', ' SI'],
    ['CONDICIONES DE PAGO:', ' INMEDIATO'],
    ['COTIZACION VALIDA POR:', ' 15 DIAS'],
    ['GARANTIA SOBRE MATERIAL NUEVO:', ' 12 MESES']
  ];
  doc.setFontSize(9);
  doc.setTextColor(...DARK);
  for(const [k,v] of condiciones){
    doc.setFont('helvetica','bold');
    doc.text(k, M, fy);
    const kW = doc.getTextWidth(k);
    if(v){
      doc.setFont('helvetica','normal');
      doc.text(v, M + kW, fy);
    }
    fy += 12;
  }

  if(faltantes.length){
    fy += 4;
    doc.setFontSize(8);
    doc.setTextColor(180,90,80);
    doc.text('⚠ Productos sin precio en sistema: '+faltantes.join(', '), M, fy);
  }

  // Nombre limpio para el archivo
  const clienteSafe = (datos.cliente||'cliente').replace(/[^a-z0-9]/gi,'_').substring(0,40);
  const pdfFileName = 'Cotizacion_' + folio + '_' + clienteSafe + '.pdf';
  const storagePath = 'cotizaciones-web/' + folio + '_' + clienteSafe + '.pdf';

  const pdfBlob = doc.output('blob');

  const btnSubmit = document.querySelector('#modalCliente button.primary, #modalCliente button.btn-primary');
  const submitTxt = btnSubmit ? btnSubmit.textContent : '';
  if(btnSubmit){ btnSubmit.disabled = true; btnSubmit.textContent = 'Procesando…'; }

  // Preparar payload de venta
  const sistemaLabel = sistemaActual==='selectivo' ? 'Rack Selectivo' : (sistemaActual==='picking' ? 'Picking' : 'Góndola');
  const lineasVenta = lineasParaPDF.map(l => ({
    producto: l.producto,
    cantidad: l.cantidad,
    precio: parseFloat((l.precioUSD * tc).toFixed(4)),
    impuesto: IVA_FIJO,
    descuento: 0,
    desc: ''
  }));

  (async ()=>{
    // 1) Subir PDF a Supabase Storage (queda respaldado para verlo desde ISA-OS)
    try{
      await fetch(SB_URL + '/storage/v1/object/planos/' + storagePath, {
        method: 'POST',
        headers: {
          apikey: SB_KEY,
          Authorization: 'Bearer ' + SB_KEY,
          'Content-Type': 'application/pdf',
          'x-upsert': 'true'
        },
        body: pdfBlob
      });
    }catch(e){ console.error('Upload PDF:', e); }

    // 2) Insertar venta en tabla ventas (aparece en pestaña 🌐 Web de ISA-OS)
    try{
      await sbInsertVenta({
        num: folio,
        fecha: fechaHoy.toISOString().slice(0,10),
        cliente: datos.cliente,
        razon: datos.razon || null,
        rfc: datos.rfc || null,
        email: datos.email || null,
        tel: datos.tel || null,
        cel: datos.tel || null,
        dir: datos.dir || null,
        contacto: datos.contacto || null,
        comercial: 'Web',
        tipo: 'Cotización',
        stage: 'Presupuesto',
        estatus: 'Web',
        moneda: monedaSel,
        plantilla: sistemaLabel + ' · ' + configResumen().txt,
        lineas: lineasVenta,
        total: parseFloat((totalUSD * tc).toFixed(2))
      });
    }catch(e){ console.error('sbInsertVenta:', e); }

    // 3) Entregar SOLO el PDF al cliente (sin abrir WhatsApp)
    try{
      const esMovil = /android|iphone|ipad|ipod|mobile/i.test(navigator.userAgent);
      if(esMovil){
        // En móvil: abrir el PDF en nueva pestaña — el visor nativo permite guardar/compartir
        const blobUrl = URL.createObjectURL(pdfBlob);
        window.open(blobUrl, '_blank');
        setTimeout(()=>URL.revokeObjectURL(blobUrl), 60000);
      } else {
        // En desktop: descarga directa
        const blobUrl = URL.createObjectURL(pdfBlob);
        const a = document.createElement('a');
        a.href = blobUrl; a.download = pdfFileName;
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(()=>URL.revokeObjectURL(blobUrl), 5000);
      }
    }catch(e){ console.error('Deliver PDF:', e); }

    if(btnSubmit){ btnSubmit.disabled = false; btnSubmit.textContent = submitTxt; }
    cerrarModal();
  })();
}

// ───────── Eventos ─────────
function addEvents(){
  const dom = renderer.domElement;
  dom.addEventListener('mousedown', e=>{isDrag=true; lpX=e.clientX; lpY=e.clientY;});
  addEventListener('mouseup', ()=>isDrag=false);
  addEventListener('mousemove', e=>{
    if(!isDrag) return;
    rotY += (e.clientX-lpX)*0.008;
    rotX += (e.clientY-lpY)*0.008;
    rotX = Math.max(-0.2, Math.min(1.2, rotX));
    lpX=e.clientX; lpY=e.clientY;
  });
  dom.addEventListener('wheel', e=>{
    e.preventDefault();
    camDist += e.deltaY*0.0016; camDist = Math.max(1.6, Math.min(18, camDist));
  }, {passive:false});
  dom.addEventListener('touchstart', e=>{isDrag=true; lpX=e.touches[0].clientX; lpY=e.touches[0].clientY;}, {passive:true});
  addEventListener('touchend', ()=>isDrag=false);
  dom.addEventListener('touchmove', e=>{
    if(!isDrag) return;
    e.preventDefault();
    rotY += (e.touches[0].clientX-lpX)*0.01;
    rotX += (e.touches[0].clientY-lpY)*0.01;
    rotX = Math.max(-0.2, Math.min(1.2, rotX));
    lpX=e.touches[0].clientX; lpY=e.touches[0].clientY;
  }, {passive:false});
  // Checkbox altura manual + cambios de niveles regeneran los inputs
  ['picAlturaManual','selAlturaManual'].forEach(id=>{
    document.getElementById(id).addEventListener('change', ()=>{
      const sistema = id.startsWith('pic') ? 'picking' : 'selectivo';
      actualizarInputsAlturasNivel(sistema);
      build();
    });
  });
  // Cuando cambia el número de niveles, regenerar los inputs (si activos)
  document.getElementById('picNiveles').addEventListener('change', ()=>actualizarInputsAlturasNivel('picking'));
  document.getElementById('selNiveles').addEventListener('change', ()=>actualizarInputsAlturasNivel('selectivo'));
  // Cuando cambia el alto del marco, también regenerar (porque el default depende del alto)
  document.getElementById('picAlto').addEventListener('change', ()=>actualizarInputsAlturasNivel('picking'));
  document.getElementById('selAlto').addEventListener('change', ()=>actualizarInputsAlturasNivel('selectivo'));

  ['tipo','medida','niveles','modulos','cabeceras',
   'picAlto','picFondo','picLargo','picNiveles','picCuerpos','picChkRej','picChkPanel','picChkPie',
   'selTipoFila','selAlto','selFondo','selViga','selNiveles','selCuerpos','selChkRej','selChkTri','selChkBot'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.addEventListener('change', build);
  });
  // Mantener el texto de capacidad del selectivo siempre sincronizado
  document.getElementById('selViga').addEventListener('change', actualizarSelVigaCap);
  actualizarSelVigaCap();
  // Recalcular stock visible al cambiar alto/fondo (el SKU de marco depende de la combinación)
  ['selAlto','selFondo','picAlto','picFondo'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.addEventListener('change', ()=>{ try{ actualizarStockEnDropdowns(); }catch(e){} });
  });
  // Color del rack
  document.getElementById('colorRack').addEventListener('change', ()=>{
    actualizarColorRack();
    actualizarStockEnDropdowns();
    build();
  });
  actualizarColorRack();
  ajustarSelectorColor();
  // Mostrar/ocultar selector de unión según tipo de fila
  function actualizarSelUnion(){
    const doble = document.getElementById('selTipoFila').value === 'doble';
    document.getElementById('selUnionRow').style.display = doble ? '' : 'none';
  }
  document.getElementById('selTipoFila').addEventListener('change', ()=>{
    actualizarSelUnion();
    build();
  });
  document.getElementById('selUnion').addEventListener('change', build);
  actualizarSelUnion();

  // Los tipos de CARGA por nivel son mutuamente exclusivos: solo se puede elegir uno
  // (rejilla / triplay o madera / panel beige)
  function grupoExclusivo(ids){
    ids.forEach(id=>{
      const el = document.getElementById(id);
      if(!el) return;
      el.addEventListener('change', function(){
        if(this.checked){
          ids.filter(x=>x!==id).forEach(other=>{
            const e = document.getElementById(other);
            if(e) e.checked = false;
          });
        }
      });
    });
  }
  grupoExclusivo(['selChkRej','selChkTri']);      // Selectivo: rejilla ↔ triplay
  grupoExclusivo(['picChkRej','picChkPanel']);    // Picking:   rejilla ↔ panel beige
  // Tabs: cambiar de sistema
  document.querySelectorAll('#tabs .tab').forEach(tab=>{
    tab.addEventListener('click', ()=>{
      document.querySelectorAll('#tabs .tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      sistemaActual = tab.dataset.sys;
      document.getElementById('opGondola').style.display   = sistemaActual==='gondola'   ? '' : 'none';
      document.getElementById('opPicking').style.display   = sistemaActual==='picking'   ? '' : 'none';
      document.getElementById('opSelectivo').style.display = sistemaActual==='selectivo' ? '' : 'none';
      ajustarSelectorColor();
      build();
    });
  });
  document.getElementById('reset').addEventListener('click', ()=>{rotY=0.7; rotX=0.32;});
  document.getElementById('wa').addEventListener('click', ()=>{
    const cfg = configResumen();
    const txt = 'Hola, solicito cotización desde el configurador 3D:\n\n'+cfg.txt;
    const url = 'https://wa.me/5216644211088?text=' + encodeURIComponent(txt);
    window.open(url, '_blank');
  });
  document.getElementById('pdfBtn').addEventListener('click', abrirFormCliente);
  addEventListener('resize', ()=>{ requestAnimationFrame(resize3D); });
  addEventListener('orientationchange', ()=>{ setTimeout(resize3D, 200); });

  // Deep-link: abrir en un sistema específico según hash (#selectivo, #picking, #gondola)
  const hash = (location.hash || '').replace('#','').toLowerCase();
  if(hash === 'selectivo' || hash === 'picking' || hash === 'gondola'){
    const tab = document.querySelector('#tabs .tab[data-sys="'+hash+'"]');
    if(tab) tab.click();
  }
}

function animate(){
  requestAnimationFrame(animate);
  if(document.getElementById('auto').checked && !isDrag) rotY += 0.004;
  const cx = Math.cos(rotX);
  camera.position.set(Math.sin(rotY)*cx*camDist, Math.sin(rotX)*camDist + targetY, Math.cos(rotY)*cx*camDist);
  camera.lookAt(0, targetY, 0);
  // Billboard: el sprite Isaac siempre mira hacia la cámara (sólo en eje Y, mantiene vertical)
  if(grupo){
    grupo.traverse(obj=>{
      if(obj.userData && (obj.userData.isaacSprite || obj.userData.isaacLabel)){
        const wp = new THREE.Vector3();
        obj.getWorldPosition(wp);
        const dx = camera.position.x - wp.x;
        const dz = camera.position.z - wp.z;
        obj.rotation.y = Math.atan2(dx, dz);
      }
    });
  }
  renderer.render(scene, camera);
}

cargarImagenIsaac();
// Leer ?sistema= de la URL y activar ese tab al iniciar
(function(){
  const params = new URLSearchParams(location.search);
  const sysParam = params.get('sistema');
  if(sysParam && ['gondola','picking','selectivo'].includes(sysParam)){
    sistemaActual = sysParam;
    // Activar el tab visualmente (se aplica antes de init() para que build() vea el sistema correcto)
    document.querySelectorAll('#tabs .tab').forEach(t=>{
      if(t.dataset.sys === sysParam) t.classList.add('active');
      else t.classList.remove('active');
    });
    document.getElementById('opGondola').style.display   = sysParam==='gondola'   ? '' : 'none';
    document.getElementById('opPicking').style.display   = sysParam==='picking'   ? '' : 'none';
    document.getElementById('opSelectivo').style.display = sysParam==='selectivo' ? '' : 'none';
  }
})();
init();
// Safari iOS calcula el layout tarde — reforzar el resize cuando todo esté listo
addEventListener('load', ()=>{ setTimeout(resize3D, 50); setTimeout(resize3D, 300); });
</script>
